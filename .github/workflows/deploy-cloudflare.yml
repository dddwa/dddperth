name: Deploy to Production

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths-ignore:
            - 'website-content/**'
            - 'blog/**'
            - '**.md'
            - 'docs/**'

concurrency:
    group: deploy-production
    cancel-in-progress: false

permissions:
    contents: read
    deployments: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        environment:
            name: production
            url: https://dddperth.com

        env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              name: Install pnpm
              with:
                  run_install: false

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate types (PandaCSS + React Router)
              run: pnpm run setup

            - name: Type check
              run: pnpm tsc -b

            - name: Lint
              run: pnpm nx run-many --target=lint --all

            - name: Build
              run: pnpm nx build website

            - name: Apply D1 migrations (production)
              run: pnpm nx d1-migrate-production website

            - name: Deploy
              run: pnpm nx deploy-production website
